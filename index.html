<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJM - NASA | Operations Hub</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1b4332">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f4f1;
            overflow-x: hidden;
        }

        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.08;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 10c0 5-5 10-5 10s5 5 5 10c0-5 5-10 5-10s-5-5-5-10z' fill='%231b4332'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%232d6a4f'/%3E%3Cpath d='M60 15l4 8h-8z' fill='%231b4332'/%3E%3C/svg%3E");
            background-size: 120px 120px;
            animation: moveBg 100s linear infinite;
        }

        @keyframes moveBg {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .nasa-dark-green { color: #1b4332; }
        .nasa-accent-bg { background-color: #a7c957; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: #1b4332;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #2d6a4f;
            transform: translateY(-1px);
        }

        .input-style {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <div id="auth-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass-panel p-10 rounded-[3rem] w-full max-w-md text-center">
            
            <div class="flex flex-col items-center mb-8">
                <div class="flex items-baseline italic font-black text-4xl nasa-dark-green">
                    <span>MJM</span>
                    <span class="ml-2 px-2 py-0.5 text-[14px] nasa-accent-bg text-[#1b4332] not-italic align-middle rounded-sm">NASA</span>
                </div>
                <div class="h-1 w-8 bg-[#a7c957] rounded-full mt-3"></div>
                <h2 id="auth-title" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em] mt-4">Operations Login</h2>
            </div>

            <div id="verify-msg" class="hidden mb-6 p-4 bg-green-50 border border-green-200 rounded-2xl text-green-700 text-sm font-semibold animate-pulse text-center">
                📧 Update sent! Check your inbox.
            </div>

            <div class="space-y-4">
                <div id="signup-fields" class="hidden space-y-4 text-left">
                    <input type="text" id="user-name" placeholder="Full Name" class="w-full p-4 input-style rounded-2xl outline-none font-semibold">
                </div>
                
                <input type="email" id="email" placeholder="Email Address" class="w-full p-4 input-style rounded-2xl outline-none font-semibold">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 input-style rounded-2xl outline-none font-semibold">
                
                <button id="main-auth-btn" class="w-full btn-primary text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-lg">Login</button>

                <div id="forgot-password-container" class="text-center">
                    <button id="forgot-password-btn" class="text-[10px] font-bold text-slate-400 hover:text-emerald-700 uppercase tracking-widest transition-colors">Forgot Password?</button>
                </div>

                <button id="toggle-auth-btn" class="w-full text-slate-500 font-bold mt-2 text-[10px] uppercase tracking-widest hover:text-green-700">Create Account</button>
            </div>
        </div>
    </div>

    <div id="reset-section" class="hidden flex items-center justify-center min-h-screen p-4">
        <div class="glass-panel p-10 rounded-[3rem] w-full max-w-md text-center">
            <h2 class="text-xl font-black text-slate-800 uppercase mb-2 text-center">Set New Password</h2>
            <input type="password" id="new-password" placeholder="Enter New Password" class="w-full p-4 input-style rounded-2xl outline-none font-semibold mb-4 text-center">
            <button id="update-pass-btn" class="w-full btn-primary text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-lg">Update & Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-4 md:p-8">
        <div class="max-w-4xl mx-auto">
            <div class="flex flex-col items-center mb-10 glass-panel p-8 rounded-[2.5rem] relative">
                <button id="logout-btn" class="absolute top-6 right-6 text-[10px] font-bold text-slate-400 hover:text-red-500 uppercase tracking-widest bg-white px-5 py-2 rounded-full border border-slate-100 shadow-sm">Sign Out</button>
                <div class="text-center">
                    <div class="flex items-center justify-center italic font-black text-3xl nasa-dark-green mb-2">
                        <span>MJM</span>
                        <span class="ml-2 px-2 py-0.5 text-[12px] nasa-accent-bg text-[#1b4332] not-italic rounded-sm">NASA</span>
                    </div>
                    <p class="text-[14px] font-black text-slate-500 uppercase tracking-[0.3em]">Central Operations Hub</p>
                </div>
            </div>
            <div class="glass-panel p-8 rounded-[2.5rem] border-l-[12px] border-green-600">
                <span class="text-xl font-black text-slate-800 uppercase">📈 Operations Data</span>
                <p class="text-xs text-gray-500 mt-2">Authenticated: Ready for analysis.</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://briqzyxfxsvulyizzbiu.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_go1nlzqVr9Q9FHvWXvZduQ_sPLWs2tn';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isRecovering = false;

        document.addEventListener('DOMContentLoaded', () => {
            const mainBtn = document.getElementById('main-auth-btn');
            const toggleBtn = document.getElementById('toggle-auth-btn');
            const forgotBtn = document.getElementById('forgot-password-btn');
            const signupFields = document.getElementById('signup-fields');
            const authTitle = document.getElementById('auth-title');
            const verifyMsg = document.getElementById('verify-msg');
            const forgotContainer = document.getElementById('forgot-password-container');
            const updatePassBtn = document.getElementById('update-pass-btn');

            toggleBtn.addEventListener('click', () => {
                const isCurrentlyLogin = (mainBtn.innerText === 'LOGIN');
                verifyMsg.classList.add('hidden');
                if (isCurrentlyLogin) {
                    signupFields.classList.remove('hidden');
                    forgotContainer.classList.add('hidden');
                    mainBtn.innerText = 'SIGN UP';
                    authTitle.innerText = 'Account Registration';
                    toggleBtn.innerText = 'Back to Login';
                } else {
                    signupFields.classList.add('hidden');
                    forgotContainer.classList.remove('hidden');
                    mainBtn.innerText = 'LOGIN';
                    authTitle.innerText = 'Operations Login';
                    toggleBtn.innerText = 'Create Account';
                }
            });

            forgotBtn.addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                if (!email) return alert("Please enter your email address first.");
                
                const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.href, 
                });

                if (error) {
                    alert("Rate Limit: " + error.message);
                } else {
                    verifyMsg.innerText = "📧 Reset link sent! Check your inbox.";
                    verifyMsg.classList.remove('hidden');
                }
            });

            updatePassBtn.addEventListener('click', async () => {
                const newPassword = document.getElementById('new-password').value;
                if (!newPassword || newPassword.length < 6) return alert("Password must be at least 6 characters.");
                
                const { error } = await _supabase.auth.updateUser({ password: newPassword });
                
                if (error) {
                    alert(error.message);
                } else {
                    alert("Success! Password reset. You may now log in.");
                    await _supabase.auth.signOut();
                    window.location.href = window.location.origin + window.location.pathname;
                }
            });

            mainBtn.addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                if (mainBtn.innerText === 'SIGN UP') {
                    const fullName = document.getElementById('user-name').value;
                    if(!fullName) return alert("Please enter your name.");

                    // CHECK IF EMAIL EXISTS
                    const { data: existingUser } = await _supabase.from('profiles').select('email').eq('email', email).single();
                    if (existingUser) return alert("This email is already registered. Please login instead.");

                    const { data, error } = await _supabase.auth.signUp({ 
                        email, 
                        password,
                        options: { emailRedirectTo: window.location.href }
                    });
                    
                    if (error) return alert(error.message);
                    if (data.user) {
                        await _supabase.from('profiles').insert([{ id: data.user.id, full_name: fullName, email: email }]);
                        verifyMsg.innerText = "📧 Check your email to verify your account!";
                        verifyMsg.classList.remove('hidden');
                    }
                } else {
                    const { error } = await _supabase.auth.signInWithPassword({ email, password });
                    if (error) alert("Login Failed: " + error.message);
                }
            });

            _supabase.auth.onAuthStateChange((event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    isRecovering = true;
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('reset-section').classList.remove('hidden');
                } else if (session && !isRecovering) {
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                } else {
                    document.getElementById('auth-section').classList.remove('hidden');
                    document.getElementById('dashboard').classList.add('hidden');
                }
            });

            document.getElementById('logout-btn').addEventListener('click', async () => {
                await _supabase.auth.signOut();
                location.reload();
            });
        });
    </script>
</body>
</html>
