<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJM - AI Central Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="fibre-optics">
        <div class="spark h-1"></div>
        <div class="spark h-2"></div>
        <div class="spark h-3"></div>
        <div class="spark v-1"></div>
        <div class="spark v-2"></div>
    </div>

    <div id="auth-section" class="flex items-center justify-center min-h-screen p-4 relative">
        <div class="glass-panel p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] w-full max-w-md text-center border border-slate-200">
            <div class="flex flex-col items-center mb-8">
                
                <div class="flex items-center font-black text-4xl text-[#1b4332] tracking-tight mb-2">
                    <span class="italic">MJM</span>
                    <div class="ml-3 relative group">
                        <div class="absolute -inset-1 bg-emerald-400 rounded-lg blur opacity-40 animate-pulse"></div>
                        <span class="relative px-3 py-1 text-[16px] bg-emerald-500 text-white rounded border border-emerald-300 uppercase tracking-[0.3em] font-bold shadow-[0_0_15px_rgba(16,185,129,0.5)] flex items-center gap-1.5">
                            <svg class="w-4 h-4 animate-[spin_4s_linear_infinite]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                            AI
                        </span>
                    </div>
                </div>

                <h2 id="auth-title" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em] mt-4 min-h-[16px]"></h2>
            </div>
            
            <div id="standard-auth-fields" class="space-y-4">
                <div id="signup-fields" class="hidden space-y-4 text-left">
                    <input type="text" id="user-name" placeholder="Full Name" class="w-full p-4 input-style rounded-2xl outline-none font-semibold">
                </div>
                <input type="email" id="email" placeholder="Email Address" class="w-full p-4 input-style rounded-2xl outline-none font-semibold">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 input-style rounded-2xl outline-none font-semibold">
                <button id="main-auth-btn" class="w-full btn-primary text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-lg">LOGIN</button>
                <div id="forgot-password-container" class="text-center">
                    <button id="forgot-password-btn" class="text-[10px] font-bold text-slate-400 hover:text-emerald-700 uppercase tracking-widest">Forgot Password?</button>
                </div>
                <button id="toggle-auth-btn" class="w-full text-slate-500 font-bold mt-2 text-[10px] uppercase tracking-widest">Create Account</button>
            </div>

            <div id="recovery-auth-fields" class="hidden space-y-4">
                <div class="text-center text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-2">Create New Password</div>
                <input type="password" id="new-password" placeholder="Enter New Password" class="w-full p-4 input-style rounded-2xl outline-none font-semibold">
                <button id="update-password-btn" class="w-full btn-primary text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-lg">Save New Password</button>
            </div>
        </div>
        
        <div class="absolute bottom-10 left-0 w-full text-center pointer-events-none">
            <span class="text-[10px] font-bold text-slate-400/50 uppercase tracking-[0.5em]">The future is here</span>
        </div>
    </div>

    <div id="dashboard" class="hidden p-2 md:p-8 max-w-5xl mx-auto space-y-4 md:space-y-6">
        <div class="flex flex-col items-center glass-panel p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] relative">
            <button id="logout-btn" class="absolute top-4 right-4 md:top-6 md:right-6 text-[9px] md:text-[10px] font-bold text-slate-400 hover:text-red-500 uppercase tracking-widest bg-white px-4 md:px-5 py-2 rounded-full border border-slate-100 shadow-sm z-10">Sign Out</button>
            <div class="text-center relative z-10 mt-4 md:mt-0">
                <div class="flex items-center justify-center font-black text-3xl md:text-4xl text-[#1b4332] tracking-tight mb-2">
                    <span class="italic">MJM</span>
                    <div class="ml-3 relative group">
                        <div class="absolute -inset-1 bg-emerald-400 rounded-lg blur opacity-40 animate-pulse"></div>
                        <span class="relative px-3 py-1 text-[14px] md:text-[16px] bg-emerald-500 text-white rounded border border-emerald-300 uppercase tracking-[0.3em] font-bold shadow-[0_0_15px_rgba(16,185,129,0.5)] flex items-center gap-1.5">
                            <svg class="w-3 h-3 md:w-4 md:h-4 animate-[spin_4s_linear_infinite]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                            AI
                        </span>
                    </div>
                </div>

                <p class="text-lg md:text-xl font-black text-emerald-800 uppercase tracking-[0.3em] md:tracking-[0.4em] mt-4 drop-shadow-sm">AI Central Hub</p>
                <p class="text-[9px] md:text-[10px] font-bold text-emerald-600/70 uppercase tracking-[0.5em] md:tracking-[0.6em] mt-2 italic flex items-center justify-center gap-2 md:gap-3">
                    <span class="w-4 md:w-6 h-[1px] bg-emerald-600/40"></span>
                    The future is here
                    <span class="w-4 md:w-6 h-[1px] bg-emerald-600/40"></span>
                </p>
            </div>
        </div>

        <div id="bookshelf-module"></div>

        <div class="glass-panel rounded-[2rem] md:rounded-[2.5rem] flex flex-col h-[500px] md:h-[650px] overflow-hidden border-l-[8px] md:border-l-[12px] border-emerald-800">
            <div class="p-4 md:p-6 border-b bg-white/30 flex justify-between items-center">
                <h3 class="font-black text-slate-800 uppercase text-[10px] md:text-xs tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
                    AI Chatbox with Elon 
                </h3>
            </div>
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 text-sm"></div>
            <div class="p-3 md:p-4 bg-white/80 border-t flex gap-2">
                <input id="chat-input" type="text" placeholder="Ask Elon anything..." class="flex-1 p-3 md:p-4 input-style rounded-2xl outline-none text-xs md:text-sm font-semibold">
                <button id="send-btn" class="btn-primary text-white px-6 md:px-8 rounded-2xl font-bold uppercase text-[10px] md:text-xs">Send</button>
            </div>
        </div>
    </div>

    <div id="company-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[32px] p-8 w-full max-w-md shadow-2xl border border-slate-200">
            <h3 class="text-xl font-black text-slate-800 tracking-tight mb-6 uppercase text-center">New Tab shelf</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Tab shelf name</label>
                    <input type="text" id="new-comp-id" class="w-full mt-1 p-4 rounded-2xl border border-slate-100 bg-slate-50 text-sm font-bold focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="closeCompanyModal()" class="flex-1 p-4 rounded-2xl bg-slate-100 text-slate-600 font-bold text-xs uppercase">Cancel</button>
                    <button onclick="saveCompanyProfile()" class="flex-1 p-4 rounded-2xl bg-slate-900 text-white font-bold text-xs uppercase">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="bookshelf.js"></script> 
    <script src="dashboard.js"></script>
    <script src="pocket.js"></script>
</body>
</html>
